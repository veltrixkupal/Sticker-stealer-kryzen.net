<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRA Gallery</title>
<style>
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

body {
  background: #111;
  color: #ddd;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid #1e1e1e;
}

header span {
  font-size: 13px;
  font-weight: bold;
  color: #fff;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

header small {
  font-size: 11px;
  color: #444;
}

main {
  padding: 24px;
  max-width: 1000px;
  margin: 0 auto;
}

.info {
  margin-bottom: 16px;
}

.info h2 {
  font-size: 14px;
  color: #fff;
  margin-bottom: 3px;
}

.info p {
  font-size: 11px;
  color: #444;
}

.bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.btn {
  background: none;
  border: 1px solid #2a2a2a;
  color: #888;
  padding: 6px 12px;
  font-size: 11px;
  font-family: 'Courier New', monospace;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  letter-spacing: 0.05em;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

.btn:hover { border-color: #555; color: #ccc; }
.btn.copied { border-color: #2a4a2a; color: #4ade80; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.card {
  border: 1px solid #1e1e1e;
  background: #151515;
}

.card-img {
  width: 100%;
  aspect-ratio: 1;
  background: #0f0f0f;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: none;
}

.card-img .lbl {
  font-size: 10px;
  color: #333;
}

.card-foot {
  padding: 7px 8px 8px;
  border-top: 1px solid #1e1e1e;
}

.card-id {
  font-size: 9px;
  color: #444;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 6px;
}

.copy-btn {
  width: 100%;
  padding: 5px;
  background: none;
  border: 1px solid #222;
  color: #666;
  font-size: 10px;
  font-family: 'Courier New', monospace;
  cursor: pointer;
  letter-spacing: 0.05em;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

.copy-btn:hover { border-color: #444; color: #aaa; }
.copy-btn.copied { border-color: #2a4a2a; color: #4ade80; }

#loading, #empty, #error {
  text-align: center;
  padding: 80px 24px;
  font-size: 12px;
  color: #333;
}

code {
  font-family: 'Courier New', monospace;
  background: #1a1a1a;
  padding: 2px 6px;
  font-size: 11px;
  color: #555;
}
</style>
</head>
<body>

<header>
  <span>Gallery</span>
  <small id="hcount"></small>
</header>

<main>
  <div id="loading">loading...</div>
  <div id="empty" style="display:none">no paste id — add <code>?id=PASTE_ID</code> to the url.</div>
  <div id="error" style="display:none">failed to load. paste may be invalid or expired.</div>

  <div id="content" style="display:none">
    <div class="info">
      <h2 id="title"></h2>
      <p id="sub"></p>
    </div>
    <div class="bar" style="display:none">
      <button class="btn" id="copy-all">copy all ids</button>
      <a class="btn" id="raw" href="#" target="_blank">raw paste</a>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</main>

<script>
const id = new URLSearchParams(location.search).get('id');

function s(el, show) {
  ['loading','empty','error','content'].forEach(x => {
    document.getElementById(x).style.display = x === el ? (show === false ? 'none' : '') : 'none';
  });
}

function copy(text, btn) {
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  };
  (navigator.clipboard ? navigator.clipboard.writeText(text).catch(fallback) : Promise.resolve(fallback())).then(() => {
    if (!btn) return;
    const o = btn.textContent; btn.textContent = 'copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = o; btn.classList.remove('copied'); }, 1500);
  });
}

function parseIds(t) { return t.split('\n').map(l => l.trim()).filter(l => /^\d{8,}$/.test(l)); }
function parseMeta(t) {
  return {
    from: (t.match(/^Stickers from:\s*(.+)$/m) || [])[1]?.trim() || 'Unknown',
    date: (t.match(/^Date:\s*(.+)$/m) || [])[1]?.trim() || ''
  };
}

async function tryFetch(url) {
  const tries = [
    url,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
  ];
  for (const u of tries) {
    try {
      const r = await fetch(u);
      if (r.ok) { const t = await r.text(); if (t) return t; }
    } catch (_) {}
  }
  return null;
}

async function fetchThumbs(ids) {
  const map = {};
  for (let i = 0; i < ids.length; i += 50) {
    const batch = ids.slice(i, i + 50);
    try {
      const r = await fetch(`/api/thumbnails?ids=${batch.join(',')}`);
      if (r.ok) {
        const d = await r.json();
        (d.data || []).forEach(item => { if (item.imageUrl) map[String(item.targetId)] = item.imageUrl; });
      }
    } catch (_) {}
  }
  return map;
}

function card(id) {
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = `
    <div class="card-img"><span class="lbl">loading...</span><img alt=""></div>
    <div class="card-foot">
      <div class="card-id">${id}</div>
      <button class="copy-btn">copy id</button>
    </div>`;
  d.querySelector('.copy-btn').onclick = () => copy(id, d.querySelector('.copy-btn'));
  return d;
}

function applyThumb(c, url) {
  const img = c.querySelector('img'), lbl = c.querySelector('.lbl');
  img.onload = () => { lbl.style.display = 'none'; img.style.display = 'block'; };
  img.onerror = () => { lbl.textContent = 'no preview'; };
  img.src = url;
}

async function init() {
  if (!id) { s('empty'); return; }

  const rawUrl = `https://pastefy.app/${id}/raw`;
  const text = await tryFetch(rawUrl);
  if (!text) { s('error'); return; }

  const ids = parseIds(text);
  if (!ids.length) { s('error'); return; }

  const meta = parseMeta(text);
  document.getElementById('title').textContent = `${meta.from}'s Stickers`;
  document.getElementById('sub').textContent = `${ids.length} sticker${ids.length !== 1 ? 's' : ''}${meta.date ? ' · ' + meta.date : ''}`;
  document.getElementById('hcount').textContent = ids.length + ' stickers';
  document.getElementById('raw').href = rawUrl;
  document.getElementById('copy-all').onclick = () => copy(ids.join('\n'), document.getElementById('copy-all'));

  const grid = document.getElementById('grid');
  const cards = {};
  ids.forEach(id => { const c = card(id); cards[id] = c; grid.appendChild(c); });

  s('content');

  const thumbs = await fetchThumbs(ids);
  ids.forEach(id => {
    if (thumbs[id]) applyThumb(cards[id], thumbs[id]);
    else cards[id].querySelector('.lbl').textContent = 'no preview';
  });
}

init();
</script>
</body>
</html>
